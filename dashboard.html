<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokémon Bank - Dashboard</title>

    <!-- Bootstrap 4.0 CSS -->
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />

    <!-- SweetAlert2 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- ValidateJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/validate.js/0.13.1/validate.min.js"></script>

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Estilos del dashboard -->
    <link rel="stylesheet" href="css/main/styles.css" />
  </head>
  <body>
    <div class="wrapper">
      <!-- Sidebar -->
      <nav id="sidebar" class="active">
        <div class="sidebar-header">
          <img src="img/pokeball.png" alt="Pokeball" class="sidebar-logo" />
          <h3>Pokémon Bank</h3>
        </div>

        <ul class="list-unstyled components">
          <li class="active" id="menuInicio">
            <a href="dashboard.html">
              <i class="fas fa-home"></i>
              <span>Inicio</span>
            </a>
          </li>
          <li id="menuHistorial">
            <a href="historial.html">
              <i class="fas fa-history"></i>
              <span>Historial</span>
            </a>
          </li>
          <li id="menuGraficos">
            <a href="graficos.html">
              <i class="fas fa-chart-pie"></i>
              <span>Gráficos</span>
            </a>
          </li>
          <li class="logout-item">
            <a href="#" id="logoutBtn">
              <i class="fas fa-sign-out-alt"></i>
              <span>Salir</span>
            </a>
          </li>
        </ul>

        <div class="sidebar-footer">
          <div class="user-info">
            <i class="fas fa-user-circle"></i>
            <div>
              <p class="mb-0 font-weight-bold" id="userName">Ash Ketchum</p>
              <small id="userAccount">0987654321</small>
            </div>
          </div>
        </div>
      </nav>

      <!-- Page Content -->
      <div id="content">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
          <div class="container-fluid">
            <button
              type="button"
              id="sidebarCollapse"
              class="btn btn-pokemon-menu"
            >
              <i class="fas fa-bars"></i>
            </button>

            <div class="navbar-right ml-auto">
              <div class="dropdown">
                <button
                  class="btn btn-light dropdown-toggle"
                  type="button"
                  id="dropdownMenuButton"
                  data-toggle="dropdown"
                >
                  <i class="fas fa-user mr-2"></i
                  ><span id="navbarUserName">Ash Ketchum</span>
                  <small class="text-muted ml-2" id="navbarAccount">(0987654321)</small>
                </button>
                <div class="dropdown-menu dropdown-menu-right">
                  <div class="dropdown-divider"></div>
                  <a
                    class="dropdown-item text-danger"
                    href="#"
                    id="logoutDropdownBtn"
                    ><i class="fas fa-sign-out-alt mr-2"></i>Cerrar Sesión</a
                  >
                </div>
              </div>
            </div>
          </div>
        </nav>

        <!-- Main Content -->
        <div class="main-content">
          <!-- Sección Dashboard Principal -->
          <div id="dashboardSection">
            <div class="row mb-4">
              <div class="col-md-8">
                <div class="welcome-card">
                  <h2>¡Hola, <span id="welcomeUserName">Ash</span>! 👋</h2>
                  <p class="text-muted">Cuenta: <strong id="welcomeAccount">0987654321</strong></p>
                </div>
              </div>
              <div class="col-md-4">
                <div class="balance-card">
                  <small>Saldo disponible</small>
                  <h3 id="saldo">$500.00</h3>
                  <small class="text-success"
                    ><i class="fas fa-arrow-up"></i> Actualizado</small
                  >
                </div>
              </div>
            </div>

            <div class="row mb-4">
              <div class="col-12">
                <div class="actions-placeholder">
                  <h2 class="mb-3">Acciones Rápidas</h2>
                  <div id="acordion">
                    <div class="card">
                      <div class="card-header" id="headerDeposito">
                        <h5 class="mb-0">
                          <button
                            class="btn btn-link w-100 text-left"
                            data-toggle="collapse"
                            data-target="#collapseDeposit"
                          >
                            <i class="fas fa-arrow-down mr-2"></i> Depósito
                          </button>
                        </h5>
                      </div>
                      <div
                        id="collapseDeposit"
                        class="collapse"
                        data-parent="#acordion"
                      >
                        <div class="card-body">
                          <form id="formDeposito">
                            <div class="form-group">
                              <label>Tipo de Depósito</label>
                              <select class="form-control" id="tipoDeposito">
                                <option>Cuenta Propia</option>
                                <option>Cuenta de Tercero</option>
                              </select>
                            </div>
                            <div class="form-group">
                              <label>Institución Bancaria</label>
                              <input
                                type="text"
                                class="form-control"
                                id="institucionDeposito"
                                placeholder="Ej: Pokemon Bank"
                              />
                            </div>
                            <div class="form-group">
                              <label>Monto (Máx. $10,000)</label>
                              <input
                                type="number"
                                class="form-control"
                                id="montoDeposito"
                                placeholder="$0.00"
                                step="0.01"
                              />
                            </div>
                            <button
                              type="button"
                              class="btn btn-success btn-block"
                              onclick="hacerDeposito()"
                            >
                              Confirmar Depósito
                            </button>
                          </form>
                        </div>
                      </div>
                    </div>

                    <div class="card">
                      <div class="card-header" id="headerRetiro">
                        <h5 class="mb-0">
                          <button
                            class="btn btn-link w-100 text-left collapsed"
                            data-toggle="collapse"
                            data-target="#collapseRetiro"
                          >
                            <i class="fas fa-arrow-up mr-2"></i> Retiro
                          </button>
                        </h5>
                      </div>
                      <div
                        id="collapseRetiro"
                        class="collapse"
                        data-parent="#acordion"
                      >
                        <div class="card-body">
                          <form id="formRetiro">
                            <div class="form-group">
                              <label>Tipo de Retiro</label>
                              <select class="form-control" id="tipoRetiro">
                                <option>Cajero</option>
                                <option>Ventanilla</option>
                              </select>
                            </div>
                            <div class="form-group">
                              <label>Monto (Máx. $10,000)</label>
                              <input
                                type="number"
                                class="form-control"
                                id="montoRetiro"
                                placeholder="$0.00"
                                step="0.01"
                              />
                            </div>
                            <button
                              type="button"
                              class="btn btn-danger btn-block"
                              onclick="hacerRetiro()"
                            >
                              Confirmar Retiro
                            </button>
                          </form>
                        </div>
                      </div>
                    </div>

                    <div class="card">
                      <div class="card-header" id="headerPago">
                        <h5 class="mb-0">
                          <button
                            class="btn btn-link w-100 text-left collapsed"
                            data-toggle="collapse"
                            data-target="#collapsePago"
                          >
                            <i class="fas fa-file-invoice-dollar mr-2"></i> Pago
                            de Servicios
                          </button>
                        </h5>
                      </div>
                      <div
                        id="collapsePago"
                        class="collapse"
                        data-parent="#acordion"
                      >
                        <div class="card-body">
                          <form id="formPago">
                            <div class="form-group">
                              <label>Tipo de Servicio</label>
                              <select class="form-control" id="tipoServicio">
                                <option>Agua</option>
                                <option>Energía Eléctrica</option>
                                <option>Internet / Telefonía</option>
                              </select>
                            </div>
                            <div class="form-group">
                              <label>NPE / Número de Referencia</label>
                              <input
                                type="text"
                                class="form-control"
                                id="referenciaPago"
                                placeholder="Ej: 123456789"
                              />
                            </div>
                            <div class="form-group">
                              <label>Monto (Máx. $10,000)</label>
                              <input
                                type="number"
                                class="form-control"
                                id="montoPago"
                                placeholder="$0.00"
                                step="0.01"
                              />
                            </div>
                            <button
                              type="button"
                              class="btn btn-primary btn-block"
                              onclick="hacerPago()"
                            >
                              Confirmar Pago
                            </button>
                          </form>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Sección Historial (iframe) -->
          <div id="historialSection" style="display: none">
            <div class="iframe-container">
              <iframe
                id="historialIframe"
                src="historial.html"
                style="height: 500px"
              ></iframe>
            </div>
          </div>

          <!-- Sección Gráficos (iframe) -->
          <div id="graficosSection" style="display: none">
            <div class="iframe-container">
              <iframe
                id="graficosIframe"
                src="graficos.html"
                style="height: 450px"
              ></iframe>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

    <script>
      // Variables globales
      let saldo = 500.00;
      let historial = [];
      const MONTO_MAXIMO = 10000;

      const pokemonUser = sessionStorage.getItem("pokemonUser");
      if (!pokemonUser) {
        window.location.href = "index.html";
      }

      const userName = sessionStorage.getItem("pokemonUser") || "Ash Ketchum";
      const userAccount = sessionStorage.getItem("pokemonAccount") || "0987654321";

      // Mostrar usuario y cuenta en todos lados
      document.getElementById("userName").textContent = userName;
      document.getElementById("userAccount").textContent = userAccount;
      document.getElementById("navbarUserName").textContent = userName;
      document.getElementById("navbarAccount").textContent = `(${userAccount})`;
      document.getElementById("welcomeAccount").textContent = userAccount;
      const firstName = userName.split(" ")[0];
      document.getElementById("welcomeUserName").textContent = firstName;

      // Validaciones con ValidateJS
      const montoConstraints = {
        monto: {
          numericality: {
            greaterThan: 0,
            lessThanOrEqualTo: MONTO_MAXIMO,
            message: `^El monto debe ser mayor a 0 y no exceder $${MONTO_MAXIMO.toFixed(2)}`
          }
        }
      };

      // Función para generar comprobante PDF
      function generarComprobantePDF(tipo, detalle, monto, nuevoSaldo) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        const fecha = new Date().toLocaleString('es-ES');
        const usuario = sessionStorage.getItem('pokemonUser') || 'Ash Ketchum';
        const cuenta = sessionStorage.getItem('pokemonAccount') || '0987654321';
        
        doc.setFillColor(42, 117, 187);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(18);
        doc.text('POKÉMON BANK', 105, 15, { align: 'center' });
        doc.setFontSize(10);
        doc.text('Comprobante de Transacción', 105, 25, { align: 'center' });
        
        doc.setTextColor(0, 0, 0);
        doc.setFontSize(11);
        doc.text(`Fecha: ${fecha}`, 20, 55);
        doc.text(`Usuario: ${usuario}`, 20, 65);
        doc.text(`Cuenta: ${cuenta}`, 20, 75);
        
        doc.setDrawColor(200, 200, 200);
        doc.line(20, 85, 190, 85);
        
        doc.setFontSize(12);
        doc.setFont(undefined, 'bold');
        doc.text(`Tipo: ${tipo}`, 20, 100);
        doc.text(`Detalle: ${detalle}`, 20, 115);
        doc.text(`Monto: $${monto.toFixed(2)}`, 20, 130);
        doc.text(`Saldo nuevo: $${nuevoSaldo.toFixed(2)}`, 20, 145);
        
        doc.setFont(undefined, 'normal');
        doc.setFontSize(9);
        doc.setTextColor(100, 100, 100);
        doc.text('Este comprobante es válido para fines informativos.', 105, 270, { align: 'center' });
        
        doc.save(`Comprobante_${tipo}_${Date.now()}.pdf`);
        
        Swal.fire({
          icon: 'success',
          title: '📄 Comprobante generado',
          text: 'El PDF se ha descargado correctamente',
          timer: 1500,
          showConfirmButton: false
        });
      }

      document.getElementById("sidebarCollapse").addEventListener("click", function () {
        document.getElementById("sidebar").classList.toggle("active");
      });

      window.showSection = function (section) {
        document.getElementById("dashboardSection").style.display = "none";
        document.getElementById("historialSection").style.display = "none";
        document.getElementById("graficosSection").style.display = "none";

        if (section === "dashboard") {
          document.getElementById("dashboardSection").style.display = "block";
        } else if (section === "historial") {
          document.getElementById("historialSection").style.display = "block";
          const iframe = document.getElementById("historialIframe");
          if (iframe) {
            iframe.src = iframe.src;
          }
        } else if (section === "graficos") {
          document.getElementById("graficosSection").style.display = "block";
          const iframe = document.getElementById("graficosIframe");
          if (iframe) {
            iframe.src = iframe.src;
          }
        }
      };

      function cargarDatos() {
        const saldoGuardado = localStorage.getItem("pokemonSaldo");
        const historialGuardado = localStorage.getItem("pokemonHistorial");

        if (saldoGuardado) saldo = parseFloat(saldoGuardado);
        if (historialGuardado) historial = JSON.parse(historialGuardado);
        
        // Asegurar que la cuenta esté actualizada
        const cuentaGuardada = localStorage.getItem("pokemonAccount");
        if (cuentaGuardada && cuentaGuardada !== userAccount) {
          sessionStorage.setItem("pokemonAccount", cuentaGuardada);
        }

        actualizarSaldoPantalla();
        notificarActualizacion();
      }

      function guardarDatos() {
        localStorage.setItem("pokemonSaldo", saldo);
        localStorage.setItem("pokemonHistorial", JSON.stringify(historial));
        localStorage.setItem("pokemonAccount", userAccount);
        notificarActualizacion();
      }

      function actualizarSaldoPantalla() {
        document.getElementById("saldo").innerText = "$" + saldo.toFixed(2);
      }

      function notificarActualizacion() {
        const historialIframe = document.getElementById("historialIframe");
        const graficosIframe = document.getElementById("graficosIframe");

        if (historialIframe && historialIframe.contentWindow) {
          historialIframe.contentWindow.postMessage(
            { type: "actualizar", saldo: saldo, historial: historial },
            "*"
          );
        }

        if (graficosIframe && graficosIframe.contentWindow) {
          graficosIframe.contentWindow.postMessage(
            { type: "actualizar", saldo: saldo, historial: historial },
            "*"
          );
        }
      }

      function registrarMovimiento(tipo, detalle, monto) {
        const fecha = new Date().toLocaleString("es-ES", {
          dateStyle: "short",
          timeStyle: "short",
        });
        historial.unshift({ fecha, tipo, detalle, monto });
        guardarDatos();
      }

      window.hacerDeposito = function () {
        let inputMonto = document.getElementById("montoDeposito");
        let monto = parseFloat(inputMonto.value);
        let tipo = document.getElementById("tipoDeposito").value;
        let institucion = document.getElementById("institucionDeposito").value || "Pokémon Bank";

        const errors = validate({ monto: monto }, montoConstraints);
        
        if (errors) {
          Swal.fire("Monto inválido", errors.monto ? errors.monto[0] : `Ingresa un monto entre $0.01 y $${MONTO_MAXIMO.toFixed(2)}`, "warning");
          return;
        }

        saldo += monto;
        registrarMovimiento("Depósito", `${tipo} - ${institucion}`, monto);
        actualizarSaldoPantalla();
        inputMonto.value = "";
        
        generarComprobantePDF("Depósito", `${tipo} - ${institucion}`, monto, saldo);
        
        Swal.fire("¡Depósito Exitoso!", `Se han depositado $${monto.toFixed(2)} a tu cuenta.`, "success");
      };

      window.hacerRetiro = function () {
        let inputMonto = document.getElementById("montoRetiro");
        let monto = parseFloat(inputMonto.value);
        let tipo = document.getElementById("tipoRetiro").value;

        const errorsMonto = validate({ monto: monto }, montoConstraints);
        
        if (errorsMonto) {
          Swal.fire("Monto inválido", errorsMonto.monto ? errorsMonto.monto[0] : `Ingresa un monto entre $0.01 y $${MONTO_MAXIMO.toFixed(2)}`, "warning");
          return;
        }

        if (monto > saldo) {
          Swal.fire("Fondos Insuficientes", `No tienes suficiente saldo. Saldo actual: $${saldo.toFixed(2)}`, "error");
          return;
        }

        saldo -= monto;
        registrarMovimiento("Retiro", `${tipo} - Retiro en efectivo`, monto);
        actualizarSaldoPantalla();
        inputMonto.value = "";
        
        generarComprobantePDF("Retiro", `${tipo} - Retiro en efectivo`, monto, saldo);
        
        Swal.fire("¡Retiro Exitoso!", `Has retirado $${monto.toFixed(2)}. Por favor toma tu efectivo.`, "success");
      };

      window.hacerPago = function () {
        let inputMonto = document.getElementById("montoPago");
        let selectorServicio = document.getElementById("tipoServicio");
        let referencia = document.getElementById("referenciaPago").value;
        let monto = parseFloat(inputMonto.value);
        let servicio = selectorServicio.value;

        const errorsMonto = validate({ monto: monto }, montoConstraints);
        
        if (errorsMonto) {
          Swal.fire("Monto inválido", errorsMonto.monto ? errorsMonto.monto[0] : `Ingresa un monto entre $0.01 y $${MONTO_MAXIMO.toFixed(2)}`, "warning");
          return;
        }

        if (monto > saldo) {
          Swal.fire("Fondos Insuficientes", `No tienes saldo suficiente. Saldo actual: $${saldo.toFixed(2)}`, "error");
          return;
        }

        saldo -= monto;
        registrarMovimiento("Pago", `${servicio} - Ref: ${referencia || "N/A"}`, monto);
        actualizarSaldoPantalla();
        inputMonto.value = "";
        document.getElementById("referenciaPago").value = "";
        
        generarComprobantePDF("Pago de Servicio", `${servicio} - Ref: ${referencia || "N/A"}`, monto, saldo);
        
        Swal.fire("¡Pago Exitoso!", `El pago de ${servicio} por $${monto.toFixed(2)} se realizó correctamente.`, "success");
      };

      function confirmLogout() {
        Swal.fire({
          title: "¿Cerrar sesión?",
          text: "¿Estás seguro que deseas salir?",
          icon: "question",
          showCancelButton: true,
          confirmButtonColor: "#2A75BB",
          cancelButtonColor: "#d33",
          confirmButtonText: "Sí, salir",
          cancelButtonText: "Cancelar",
        }).then((result) => {
          if (result.isConfirmed) {
            sessionStorage.clear();
            Swal.fire({
              icon: "success",
              title: "¡Hasta pronto!",
              text: "Sesión cerrada correctamente",
              timer: 1500,
              showConfirmButton: false,
            }).then(() => {
              window.location.href = "index.html";
            });
          }
        });
      }

      document.getElementById("logoutBtn").addEventListener("click", function (e) {
        e.preventDefault();
        confirmLogout();
      });

      document.getElementById("logoutDropdownBtn").addEventListener("click", function (e) {
        e.preventDefault();
        confirmLogout();
      });

      cargarDatos();
    </script>
  </body>
</html>
