<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokémon Bank - Historial</title>

    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/main/styles.css" />
  </head>
  <body>
    <div class="wrapper">
      <nav id="sidebar" class="active">
        <div class="sidebar-header">
          <img src="img/pokeball.png" alt="Pokeball" class="sidebar-logo" />
          <h3>Pokémon Bank</h3>
        </div>

        <ul class="list-unstyled components">
          <li id="menuInicio">
            <a href="dashboard.html">
              <i class="fas fa-home"></i>
              <span>Inicio</span>
            </a>
          </li>
          <li class="active" id="menuHistorial">
            <a href="historial.html">
              <i class="fas fa-history"></i>
              <span>Historial</span>
            </a>
          </li>
          <li id="menuGraficos">
            <a href="graficos.html">
              <i class="fas fa-chart-pie"></i>
              <span>Gráficos</span>
            </a>
          </li>
          <li class="logout-item">
            <a href="#" id="logoutBtn">
              <i class="fas fa-sign-out-alt"></i>
              <span>Salir</span>
            </a>
          </li>
        </ul>

        <div class="sidebar-footer">
          <div class="user-info">
            <i class="fas fa-user-circle"></i>
            <div>
              <p class="mb-0 font-weight-bold" id="userName">Ash Ketchum</p>
              <small id="userAccount">0987654321</small>
            </div>
          </div>
        </div>
      </nav>

      <div id="content">
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
          <div class="container-fluid">
            <button type="button" id="sidebarCollapse" class="btn btn-pokemon-menu">
              <i class="fas fa-bars"></i>
            </button>
            <div class="navbar-right ml-auto">
              <div class="dropdown">
                <button class="btn btn-light dropdown-toggle" type="button" id="dropdownMenuButton" data-toggle="dropdown">
                  <i class="fas fa-user mr-2"></i><span id="navbarUserName">Ash Ketchum</span>
                  <small class="text-muted ml-2" id="navbarAccount">(0987654321)</small>
                </button>
                <div class="dropdown-menu dropdown-menu-right">
                  <div class="dropdown-divider"></div>
                  <a class="dropdown-item text-danger" href="#" id="logoutDropdownBtn"><i class="fas fa-sign-out-alt mr-2"></i>Cerrar Sesión</a>
                </div>
              </div>
            </div>
          </div>
        </nav>

        <div class="main-content">
          <div class="historial-container">
            <div class="card-header bg-white border-bottom">
              <h5 class="mb-0"><i class="fas fa-history mr-2"></i>Historial de Transacciones - Cuenta: <span id="headerAccount">0987654321</span></h5>
            </div>
            <div class="table-responsive">
              <table class="table table-hover mb-0">
                <thead class="thead-light">
                  <tr>
                    <th>Fecha y Hora</th>
                    <th>Tipo</th>
                    <th>Detalle</th>
                    <th>Monto</th>
                  </tr>
                </thead>
                <tbody id="tablaHistorial">
                  <tr>
                    <td colspan="4" class="text-center text-muted py-4">
                      <i class="fas fa-inbox fa-2x mb-2 d-block"></i>
                      Aún no hay movimientos
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

    <script>
      const userName = sessionStorage.getItem("pokemonUser") || "Ash Ketchum";
      const userAccount = sessionStorage.getItem("pokemonAccount") || "0987654321";
      
      document.getElementById("userName").textContent = userName;
      document.getElementById("userAccount").textContent = userAccount;
      document.getElementById("navbarUserName").textContent = userName;
      document.getElementById("navbarAccount").textContent = `(${userAccount})`;
      document.getElementById("headerAccount").textContent = userAccount;

      const pokemonUser = sessionStorage.getItem("pokemonUser");
      if (!pokemonUser) {
        window.location.href = "index.html";
      }

      function getBadgeClass(tipo) {
        if (tipo === "Depósito") return "badge-deposito";
        if (tipo === "Retiro") return "badge-retiro";
        return "badge-pago";
      }

      function getColorMonto(tipo) {
        if (tipo === "Depósito") return "text-success";
        if (tipo === "Retiro") return "text-danger";
        return "text-primary";
      }

      function getSigno(tipo) {
        return tipo === "Depósito" ? "+" : "-";
      }

      function cargarHistorial() {
        const historial = JSON.parse(localStorage.getItem("pokemonHistorial")) || [];
        const tbody = document.getElementById("tablaHistorial");
        tbody.innerHTML = "";

        if (historial.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4"><i class="fas fa-inbox fa-2x mb-2 d-block"></i>Aún no hay movimientos</td>' + '<\/tr>';
          return;
        }

        historial.forEach((mov) => {
          tbody.innerHTML += `
            <tr>
              <td class="align-middle">${mov.fecha}</td>
              <td class="align-middle"><span class="${getBadgeClass(mov.tipo)}">${mov.tipo}</span></td>
              <td class="align-middle">${mov.detalle}</td>
              <td class="align-middle ${getColorMonto(mov.tipo)} font-weight-bold">${getSigno(mov.tipo)}$${mov.monto.toFixed(2)}</td>
            </tr>
          `;
        });
      }

      document.getElementById("sidebarCollapse").addEventListener("click", function () {
        document.getElementById("sidebar").classList.toggle("active");
      });

      function confirmLogout() {
        Swal.fire({
          title: "¿Cerrar sesión?",
          text: "¿Estás seguro?",
          icon: "question",
          showCancelButton: true,
          confirmButtonColor: "#2A75BB",
          cancelButtonColor: "#d33",
          confirmButtonText: "Sí, salir",
          cancelButtonText: "Cancelar",
        }).then((result) => {
          if (result.isConfirmed) {
            sessionStorage.clear();
            Swal.fire({ icon: "success", title: "¡Hasta pronto!", timer: 1500, showConfirmButton: false }).then(() => (window.location.href = "index.html"));
          }
        });
      }

      document.getElementById("logoutBtn").addEventListener("click", (e) => { e.preventDefault(); confirmLogout(); });
      document.getElementById("logoutDropdownBtn").addEventListener("click", (e) => { e.preventDefault(); confirmLogout(); });

      cargarHistorial();

      window.addEventListener("storage", function (e) {
        if (e.key === "pokemonHistorial") {
          cargarHistorial();
        }
      });
    </script>
  </body>
</html>
